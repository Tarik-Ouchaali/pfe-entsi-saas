services:

  # ============================================================
  # PostgreSQL — Base de données partagée
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: entsi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-entsi_saas}
      POSTGRES_USER: ${DB_USERNAME:-entsi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-entsi_user} -d ${DB_DATABASE:-entsi_saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - entsi_network

  # ============================================================
  # Redis — Queues async + Cache
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: entsi_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - entsi_network

  # ============================================================
  # Laravel — Backend principal SaaS (PHP-FPM + Nginx)
  # ============================================================
  laravel:
    build:
      context: ./backend-laravel
      dockerfile: Dockerfile
    container_name: entsi_laravel
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-entsi_saas}
      DB_USERNAME: ${DB_USERNAME:-entsi_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: local
      SHARED_STORAGE_PATH: /var/shared-storage
      AI_SERVICE_URL: http://ai-service:8000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    volumes:
      - ./backend-laravel:/var/www/html
      - shared_storage:/var/shared-storage
    ports:
      - "8080:80"
    networks:
      - entsi_network

  # ============================================================
  # Laravel Queue Worker — Traitement async des jobs IA
  # Service mstaqil — Scalable independently
  # ============================================================
  queue-worker:
    build:
      context: ./backend-laravel
      dockerfile: Dockerfile
    container_name: entsi_queue_worker
    restart: unless-stopped
    command: php artisan queue:work redis --verbose --tries=3 --timeout=180
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-entsi_saas}
      DB_USERNAME: ${DB_USERNAME:-entsi_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      QUEUE_CONNECTION: redis
      SHARED_STORAGE_PATH: /var/shared-storage
      AI_SERVICE_URL: http://ai-service:8000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    volumes:
      - ./backend-laravel:/var/www/html
      - shared_storage:/var/shared-storage
    networks:
      - entsi_network

  # ============================================================
  # FastAPI — Microservice IA / PDF / OCR
  # ============================================================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: entsi_ai_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SHARED_STORAGE_PATH: /var/shared-storage
      LARAVEL_WEBHOOK_URL: http://laravel/api/webhook/analysis-done
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      DATABASE_URL: postgresql://${DB_USERNAME:-entsi_user}:${DB_PASSWORD:-secret}@postgres:5432/${DB_DATABASE:-entsi_saas}
    volumes:
      - ./ai-service:/app
      - shared_storage:/var/shared-storage
    ports:
      - "8000:8000"
    networks:
      - entsi_network

  # ============================================================
  # Next.js — Frontend React
  # ============================================================
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: entsi_frontend
    restart: unless-stopped
    depends_on:
      - laravel
    environment:
      NEXT_PUBLIC_API_URL: http://laravel/api
    ports:
      - "3000:3000"
    networks:
      - entsi_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: entsi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
    - "5050:80"
    depends_on:
    - postgres
    networks:
    - entsi_network

# ============================================================
# Volumes persistants
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  shared_storage:
    driver: local

# ============================================================
# Réseau interne
# ============================================================
networks:
  entsi_network:
    driver: bridge